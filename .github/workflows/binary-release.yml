name: Release x64 binaries for Windows and Linux

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun i --frozen-lockfile

      - name: Compile Windows executable
        run: bun "release:win-x64"

      - name: Compile Linux binary
        run: bun "release:linux-x64"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./dist/acsd-assistant-win.exe
            ./dist/acsd-assistant-linux
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
